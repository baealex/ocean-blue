<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Document - Ocean Blue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes moveBubble {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) translateX(20px);
                opacity: 0;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e6f7ff 50%, #ffffff 100%);
            color: #2c3e50;
            line-height: 1.7;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: rgba(166, 216, 240, 0.3);
            animation: moveBubble 8s linear infinite;
        }

        .bubble:nth-child(1) {
            width: 40px;
            height: 40px;
            left: 10%;
            animation-duration: 12s;
        }

        .bubble:nth-child(2) {
            width: 60px;
            height: 60px;
            left: 30%;
            animation-duration: 16s;
            animation-delay: 2s;
        }

        .bubble:nth-child(3) {
            width: 25px;
            height: 25px;
            left: 50%;
            animation-duration: 10s;
            animation-delay: 4s;
        }

        .bubble:nth-child(4) {
            width: 80px;
            height: 80px;
            left: 70%;
            animation-duration: 18s;
            animation-delay: 1s;
        }

        .bubble:nth-child(5) {
            width: 35px;
            height: 35px;
            left: 85%;
            animation-duration: 14s;
            animation-delay: 3s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 60px;
            box-shadow: 0 20px 50px rgba(17, 148, 255, 0.15);
            animation: fadeIn 0.8s ease-out forwards;
            position: relative;
            z-index: 10;
        }

        .markdown-content h1 {
            color: #1194ff;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.3s both;
            border-bottom: 3px solid #e6f7ff;
            padding-bottom: 15px;
        }

        .markdown-content h2 {
            color: #3285d8;
            font-size: 28px;
            font-weight: 700;
            margin: 40px 0 20px 0;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .markdown-content h3 {
            color: #3285d8;
            font-size: 22px;
            font-weight: 600;
            margin: 30px 0 15px 0;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .markdown-content p {
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 20px 0;
            padding-left: 30px;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            color: #e83e8c;
        }

        .markdown-content pre {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
            border-left: 4px solid #1194ff;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: #2c3e50;
        }

        .markdown-content blockquote {
            border-left: 4px solid #1194ff;
            padding-left: 20px;
            margin: 20px 0;
            font-style: italic;
            color: #6c757d;
        }

        .markdown-content a {
            color: #1194ff;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-bottom-color 0.3s;
        }

        .markdown-content a:hover {
            border-bottom-color: #1194ff;
        }

        .markdown-content hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, #e6f7ff, transparent);
            margin: 40px 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #e6f7ff;
            padding: 12px;
            text-align: left;
        }

        .markdown-content th {
            background: #f8f9fa;
            font-weight: 600;
            color: #1194ff;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .markdown-content h1 {
                font-size: 28px;
            }
            
            .markdown-content h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <div class="markdown-content">
            {{CONTENT}}
        </div>
    </div>
</body>
</html>
