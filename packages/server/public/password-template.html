<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Required - Ocean Blue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes moveBubble {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) translateX(20px);
                opacity: 0;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e6f7ff 50%, #ffffff 100%);
            color: #3285d8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: rgba(166, 216, 240, 0.3);
            animation: moveBubble 8s linear infinite;
        }

        .bubble:nth-child(1) {
            width: 40px;
            height: 40px;
            left: 10%;
            animation-duration: 12s;
        }

        .bubble:nth-child(2) {
            width: 60px;
            height: 60px;
            left: 30%;
            animation-duration: 16s;
            animation-delay: 2s;
        }

        .bubble:nth-child(3) {
            width: 25px;
            height: 25px;
            left: 50%;
            animation-duration: 10s;
            animation-delay: 4s;
        }

        .bubble:nth-child(4) {
            width: 80px;
            height: 80px;
            left: 70%;
            animation-duration: 18s;
            animation-delay: 1s;
        }

        .bubble:nth-child(5) {
            width: 35px;
            height: 35px;
            left: 85%;
            animation-duration: 14s;
            animation-delay: 3s;
        }

        .container {
            max-width: 500px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(17, 148, 255, 0.2);
            animation: fadeIn 0.8s ease-out forwards;
            position: relative;
            z-index: 10;
        }

        .logo-container {
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        .logo {
            width: 80px;
            height: 80px;
            fill: #1194ff;
        }

        h1 {
            color: #1194ff;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        p {
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 16px;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .form-group {
            margin: 20px 0;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e6f7ff;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.8);
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #1194ff;
            box-shadow: 0 0 0 3px rgba(17, 148, 255, 0.1);
            background: white;
        }

        .button {
            background-color: #00a5fe;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            animation: fadeIn 0.8s ease-out 0.7s both, pulse 2s infinite 2s;
            width: 100%;
        }

        .button:hover {
            background-color: #0090e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 165, 254, 0.3);
        }

        .lock-icon {
            width: 24px;
            height: 24px;
            fill: #3285d8;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <div class="logo-container">
            <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M0 0h24v24H0z" fill="none" />
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z" />
            </svg>
        </div>

        <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M18,8h-1V6A5,5 0 0,0 12,1A5,5 0 0,0 7,6V8H6A2,2 0 0,0 4,10V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V10A2,2 0 0,0 18,8M9,6A3,3 0 0,1 12,4A3,3 0 0,1 15,6V8H9V6M6,10H18V20H6V10Z" />
        </svg>

        <h1>Password Required</h1>
        <p>This page is password protected. Please enter the password to continue.</p>
        
        <form method="GET">
            <div class="form-group">
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Enter password" 
                    required 
                    autofocus
                >
            </div>
            <button type="submit" class="button">Access Page</button>
        </form>
    </div>
</body>
</html>
