<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunnel Not Found - Ocean Blue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes moveBubble {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) translateX(20px);
                opacity: 0;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e6f7ff 50%, #ffffff 100%);
            color: #3285d8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(17, 148, 255, 0.2);
            animation: fadeIn 0.8s ease-out forwards;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #1194ff;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        p {
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 18px;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .logo-container {
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        .logo {
            width: 100px;
            height: 100px;
            fill: #1194ff;
        }

        .button {
            display: inline-block;
            background-color: #00a5fe;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: all 0.3s;
            animation: fadeIn 0.8s ease-out 0.7s both, pulse 2s infinite 2s;
        }

        .button:hover {
            background-color: #0090e0;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 165, 254, 0.3);
        }

        .tunnel-animation {
            position: relative;
            width: 100%;
            height: 60px;
            margin: 30px 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: rgba(230, 247, 255, 0.7);
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #1194ff;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            animation: moveDot 3s linear infinite;
            opacity: 0;
        }

        @keyframes moveDot {
            0% {
                left: -20px;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                left: calc(100% + 20px);
                opacity: 0;
            }
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            animation-delay: 0.5s;
        }

        .dot:nth-child(3) {
            animation-delay: 1s;
        }

        .dot:nth-child(4) {
            animation-delay: 1.5s;
        }

        .dot:nth-child(5) {
            animation-delay: 2s;
        }

        .bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: rgba(166, 216, 240, 0.3);
            animation: moveBubble 8s linear infinite;
        }

        .bubble:nth-child(1) {
            width: 40px;
            height: 40px;
            left: 10%;
            animation-duration: 12s;
        }

        .bubble:nth-child(2) {
            width: 60px;
            height: 60px;
            left: 30%;
            animation-duration: 16s;
            animation-delay: 2s;
        }

        .bubble:nth-child(3) {
            width: 25px;
            height: 25px;
            left: 50%;
            animation-duration: 10s;
            animation-delay: 4s;
        }

        .bubble:nth-child(4) {
            width: 80px;
            height: 80px;
            left: 70%;
            animation-duration: 18s;
            animation-delay: 1s;
        }

        .bubble:nth-child(5) {
            width: 35px;
            height: 35px;
            left: 85%;
            animation-duration: 14s;
            animation-delay: 3s;
        }
    </style>
</head>

<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <div class="logo-container">
            <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M0 0h24v24H0z" fill="none" />
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z" />
            </svg>
        </div>

        <h1>Tunnel Not Found</h1>

        <div class="tunnel-animation">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <p>The tunnel you requested doesn't exist or is currently inactive.</p>

        <a href="/" class="button">Go Home</a>
    </div>
</body>

</html>
